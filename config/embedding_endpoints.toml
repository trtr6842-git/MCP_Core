# HTTP embedding endpoints (OpenAI-compatible /v1/embeddings).
#
# Used for two purposes:
#   1. Cache rebuilds — batch-embed all chunks via GPU (maintainer workflow)
#   2. Runtime queries — faster query embedding when available
#
# If no endpoints are configured or reachable, the server falls back to
# local sentence-transformers on CPU for query embedding. Cache rebuilds
# require at least one working endpoint.
#
# Endpoints may be local (localhost) or on LAN.
#
# Fields:
#   url               — required. Base URL of the server.
#   model             — optional. Model ID sent in API requests. If omitted,
#                       the probe auto-discovers it from /v1/models.
#   context_length    — optional. Override token context window (e.g. for
#                       servers that don't report it via /v1/models).
#   instruction_prefix — optional (default false). Set true for models that
#                       expect a Qwen3-style "Instruct: ...\nQuery:" prefix
#                       on search queries (e.g. Qwen3-Embedding variants).

[[endpoints]]
url = "http://localhost:8082"
instruction_prefix = true  # Qwen3 instruction-aware query format

[[endpoints]]
url = "http://192.168.0.153:8082"
instruction_prefix = true  # Qwen3 instruction-aware query format

[[endpoints]]
url = "http://127.0.0.1:1234"
model = "text-embedding-qwen3-embedding-0.6b"
context_length = 32768  # LM Studio doesn't report this via /v1/models
instruction_prefix = true  # Qwen3 instruction-aware query format

